<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churros da Angélica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body>
    <header class="min-h-[15vh] bg-marrom-escuro flex animate-aparecer max-md:min-h-0 max-md:py-6">
        {% include "menu.html" %}
    </header>
    <main id="pedidos-page" class="bg-fundo-claro px-[3%] pt-[4vh] pb-[6vh] max-md:px-[5%] max-md:pt-[3vh] max-md:pb-[5vh]">
        <div class="flex justify-between items-center max-md:flex-col max-md:items-start max-md:gap-4">
            <div class="flex flex-col">
                <h1 class="text-[1.7rem] md:text-[2rem] lg:text-[2.25rem]">Pedidos em Produção</h1>
                <h2 class="text-[1.15rem] text-[#6b5a4e] font-semibold mt-2">Acompanhe e gerencie a fila de produção</h2>
            </div>
            <a id="btn-inserir-pedido" href="inserir-pedido"
               class="btn-1 no-underline whitespace-nowrap py-[1.4vh] px-[3%] shadow-brand-sm hover:-translate-y-0.5 max-md:self-stretch max-md:text-center">
                + Inserir Pedido
            </a>
        </div>
    </main>
    <footer class="bg-marrom-escuro">
        {% include "footer.html" %}
    </footer>
    <script src="{{ url_for('static', filename='pedidos.js') }}"></script>
    <script>createCards({{ items | tojson }})</script>
</body>

</html>
