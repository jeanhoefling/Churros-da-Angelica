<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churros da Angélica</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        {% include "menu.html" %}
    </header>
    <main id="inserir-pedido-page">
        <h1>Novo Pedido</h1>
        <h2>Adicione um novo pedido</h2>
        <form action="/inserir-pedido" method="POST">
            <div id="dados-cliente">
                <h3>Dados do Cliente</h3>
                <h4>Nome</h4>
                <input name="nome" placeholder="Nome do cliente" type="text" required>
                <h4>Whatsapp</h4>
                <input name="whatsapp" placeholder="55900001111" type="text">
                <h4>Tele</h4>
                    <input type="checkbox" name="tele" id="tele">
                </h4>
                <div id="endereco-container" style="display: none;">
                    <h4>Endereço</h4>
                    <input type="text" name="endereco" placeholder="Rua, número, bairro...">
                </div>
                <h4>Observação</h4>
                <input name="observacao" type="text">
            </div>
            <div id="dados-pedido">
                <h3>Itens do Pedido</h3>
                <div id="itens">
                    <div id="itens-head">
                        <h4>Produto</h4>
                        <h4>Quantidade</h4>
                        <h4>Preço Unit.</h4>
                        <h4>Total</h4>
                        <h4>Excluir</h4>
                    </div>
                    <div class="itens-row">
                        <select name="produtos[]">
                            <option value="tradicional">Churros Tradicional</option>
                        </select>
                        <div class="div-quantidade">
                            <button onclick="somar(this, -1)" type="button">-</button>
                            <input type="number" name="quantidades[]" value="1" min="1">
                            <button onclick="somar(this, 1)" type="button">+</button>
                        </div>
                        <p class="preco_unidade">R$ 7,00</p>
                        <p class="preco_total">R$ 7,00</p>
                        <a onclick="removeRow(this.parentElement)"><img src="{{ url_for('static', filename='/assets/excluir.png') }}"></a>
                    </div>
                </div>
                <div id="adicionar-total">
                    <button type="button" id="btn_pedidos_adicionar">+ Adicionar produto</button>
                    <div>
                        <h3>
                            Total do Pedido:
                        </h3>
                        <p>
                            R$ 7,00
                        </p>
                    </div>
                </div>
                <div id="div-salvar-pedido">
                    <button type="button" onclick="location.reload()">Limpar</button>
                    <button class="btn-1" type="submit">Salvar Pedido</button>
                </div>
            </div>
        </form>
    </main>
    <footer>
        {% include "footer.html" %}
    </footer>
    <script src="{{ url_for('static', filename='inserir-pedido.js') }}"></script>
</body>
</html>
